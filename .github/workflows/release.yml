# SVCGeyser release pipeline (manual workflow_dispatch).
#
# Before first run, configure repository secrets (Settings → Secrets → Actions):
#   KEYSTORE_BASE64      — base64-encoded release keystore
#   KEYSTORE_PASSWORD    — keystore password
#   KEY_ALIAS            — signing key alias
#   KEY_PASSWORD         — key password
#   LIVE_OAUTH_CLIENT_ID — Microsoft OAuth public client ID
# Optional (crash-log upload; leave unset to disable uploading in release builds):
#   CRASH_UPLOAD_URL     — crash-log Worker endpoint, e.g. https://crash-log-upload.<sub>.workers.dev/upload
#   CRASH_UPLOAD_API_KEY — Bearer API key for the crash-log Worker
#
# Generate keystore:
#   keytool -genkey -v -keystore release.keystore -alias svcgeyser \
#     -keyalg RSA -keysize 2048 -validity 10000
#   base64 -i release.keystore | pbcopy   # → KEYSTORE_BASE64

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: SemVer bump when version is empty
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      version:
        description: Exact SemVer (overrides bump), e.g. 1.0.0 or 1.0.0-rc.1
        required: false
        type: string
      prerelease:
        description: Mark GitHub Release as pre-release
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      version_code: ${{ steps.version.outputs.version_code }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute and validate version
        id: version
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          BUMP: ${{ github.event.inputs.bump }}
        run: |
          set -euo pipefail

          semver_core() {
            echo "$1" | sed 's/+.*//' | sed 's/-.*//'
          }

          semver_bump() {
            local version="$1"
            local bump="$2"
            local major minor patch
            major=$(echo "$version" | cut -d. -f1)
            minor=$(echo "$version" | cut -d. -f2)
            patch=$(echo "$version" | cut -d. -f3)
            case "$bump" in
              major) major=$((major + 1)); minor=0; patch=0 ;;
              minor) minor=$((minor + 1)); patch=0 ;;
              patch) patch=$((patch + 1)) ;;
              *) echo "Unknown bump: $bump" >&2; exit 1 ;;
            esac
            echo "${major}.${minor}.${patch}"
          }

          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n1 || true)
            if [ -z "$LATEST_TAG" ]; then
              BASE="0.1.0"
            else
              BASE=$(semver_core "${LATEST_TAG#v}")
            fi
            VERSION=$(semver_bump "$BASE" "$BUMP")
          fi

          SEMVER_RE='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'
          if ! echo "$VERSION" | grep -Eq "$SEMVER_RE"; then
            echo "Invalid SemVer: $VERSION" >&2
            exit 1
          fi

          CORE=$(semver_core "$VERSION")
          MAJOR=$(echo "$CORE" | cut -d. -f1)
          MINOR=$(echo "$CORE" | cut -d. -f2)
          PATCH=$(echo "$CORE" | cut -d. -f3)
          VERSION_CODE=$((MAJOR * 1000000 + MINOR * 1000 + PATCH))

          TAG="v${VERSION}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Release version: $VERSION (tag $TAG, versionCode $VERSION_CODE)"

  secret-scan:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run project secret checks
        run: bash scripts/check-secrets.sh

  build-plugin:
    needs: [validate, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Build plugin
        working-directory: plugin
        run: ./gradlew shadowJar -PreleaseVersion=${{ needs.validate.outputs.version }}

      - name: Generate checksum
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          JAR="plugin/build/libs/svcgeyser-${VERSION}.jar"
          cp "$JAR" "plugin/build/libs/svcgeyser.jar"
          sha256sum "$JAR" | tee "plugin/build/libs/svcgeyser-${VERSION}.jar.sha256"
          sha256sum "plugin/build/libs/svcgeyser.jar" | tee "plugin/build/libs/svcgeyser.jar.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: plugin
          path: |
            plugin/build/libs/svcgeyser-${{ needs.validate.outputs.version }}.jar
            plugin/build/libs/svcgeyser-${{ needs.validate.outputs.version }}.jar.sha256
            plugin/build/libs/svcgeyser.jar
            plugin/build/libs/svcgeyser.jar.sha256

  build-apk:
    needs: [validate, secret-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - uses: android-actions/setup-android@v3

      - name: Download Concentus JAR
        run: |
          mkdir -p app/app/libs
          curl -fsSL -o app/app/libs/Concentus.jar \
            "https://repo1.maven.org/maven2/io/github/jaredmdobson/concentus/1.0.2/concentus-1.0.2.jar"

      - name: Decode release keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > app/release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build signed release APK
        working-directory: app
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/app/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          LIVE_OAUTH_CLIENT_ID: ${{ secrets.LIVE_OAUTH_CLIENT_ID }}
          CRASH_UPLOAD_URL: ${{ secrets.CRASH_UPLOAD_URL }}
          CRASH_UPLOAD_API_KEY: ${{ secrets.CRASH_UPLOAD_API_KEY }}
          GRADLE_OPTS: "-Xmx4096m -XX:MaxMetaspaceSize=512m -Dfile.encoding=UTF-8"
        run: |
          ./gradlew assembleRelease \
            -PversionName=${{ needs.validate.outputs.version }} \
            -PversionCode=${{ needs.validate.outputs.version_code }} \
            -PliveOAuthClientId="$LIVE_OAUTH_CLIENT_ID" \
            -PcrashUploadUrl="$CRASH_UPLOAD_URL" \
            -PcrashUploadApiKey="$CRASH_UPLOAD_API_KEY"

      - name: Rename APK and generate checksum
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          SRC="app/app/build/outputs/apk/release/app-release.apk"
          DST="app/app/build/outputs/apk/release/svcgeyser-${VERSION}.apk"
          cp "$SRC" "$DST"
          cp "$SRC" "app/app/build/outputs/apk/release/svcgeyser.apk"
          sha256sum "$DST" | tee "app/app/build/outputs/apk/release/svcgeyser-${VERSION}.apk.sha256"
          sha256sum "app/app/build/outputs/apk/release/svcgeyser.apk" | tee "app/app/build/outputs/apk/release/svcgeyser.apk.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: |
            app/app/build/outputs/apk/release/svcgeyser-${{ needs.validate.outputs.version }}.apk
            app/app/build/outputs/apk/release/svcgeyser-${{ needs.validate.outputs.version }}.apk.sha256
            app/app/build/outputs/apk/release/svcgeyser.apk
            app/app/build/outputs/apk/release/svcgeyser.apk.sha256

  release:
    needs: [validate, build-plugin, build-apk]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: plugin
          path: dist/plugin

      - uses: actions/download-artifact@v4
        with:
          name: apk
          path: dist/apk

      - name: Write release notes
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        run: |
          {
            printf '%s\n\n' "## SVCGeyser v${VERSION}"
            printf '%s\n' "### Server plugin"
            printf '%s\n' "1. Download \`svcgeyser-${VERSION}.jar\` below."
            printf '%s\n' "2. Copy into your Paper server's \`plugins/\` folder (requires GeyserMC, Floodgate, Simple Voice Chat)."
            printf '%s\n' "3. Restart the server and edit \`plugins/SVCGeyser/config.yml\`:"
            printf '%s\n' "   - Set \`jwt-secret\` to a long random value (never commit this)."
            printf '%s\n\n' "   - Confirm \`ws-port\` (default 9000) is reachable from player phones."
            printf '%s\n' "### Android app"
            printf '%s\n' "1. Download \`svcgeyser-${VERSION}.apk\` below."
            printf '%s\n' "2. On the device: enable **Install unknown apps** for your browser or files app."
            printf '%s\n' "3. Open the APK and install (Android 7.0+ / API 24+)."
            printf '%s\n' "4. Grant **Microphone**, **Internet**, and optional **Display over other apps** (bubble overlay)."
            printf '%s\n' "5. Sign in with the same Microsoft account used on Bedrock via Geyser."
            printf '%s\n\n' "6. Connect to \`ws://<server-ip>:9000\` (or your configured port)."
            printf '%s\n' "### Build locally (maintainers)"
            printf '%s\n' "- Plugin: \`cd plugin && ./gradlew shadowJar -PreleaseVersion=${VERSION}\`"
            printf '%s\n\n' "- App: place \`Concentus.jar\` in \`app/app/libs/\`, set \`liveOAuthClientId\` in \`app/gradle.local.properties\`, then \`cd app && ./gradlew assembleRelease\`"
            printf '%s\n' "### Checksums"
            printf '%s\n' "SHA256 sums are attached as \`.sha256\` files."
          } > release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: SVCGeyser ${{ needs.validate.outputs.version }}
          body_path: release-notes.md
          prerelease: ${{ github.event.inputs.prerelease }}
          files: |
            dist/plugin/svcgeyser-${{ needs.validate.outputs.version }}.jar
            dist/plugin/svcgeyser-${{ needs.validate.outputs.version }}.jar.sha256
            dist/plugin/svcgeyser.jar
            dist/plugin/svcgeyser.jar.sha256
            dist/apk/svcgeyser-${{ needs.validate.outputs.version }}.apk
            dist/apk/svcgeyser-${{ needs.validate.outputs.version }}.apk.sha256
            dist/apk/svcgeyser.apk
            dist/apk/svcgeyser.apk.sha256
