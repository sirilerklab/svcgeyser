name: SVCGeyser
version: ${version}
main: com.sirilerklab.svcgeyser.Main
description: Simple Voice Chat + Geyser bridge
author: SirilerkLAB
api-version: '1.21'
softdepend:
  - floodgate
  - voicechat
commands:
  svc:
    description: SVCGeyser bridge status
    usage: /svc status [player]
    permission: svcgeyser.status
permissions:
  svcgeyser.status:
    description: View SVCGeyser bridge player status
    default: op
